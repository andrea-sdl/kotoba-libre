<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="feather1" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#FF2D87"/>
    </linearGradient>
    <linearGradient id="quill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <clipPath id="roundedRect1">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedRect1)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg1)"/>

    <!-- Subtle grid pattern -->
    <g opacity="0.04" stroke="#ffffff" stroke-width="1">
      <line x1="0" y1="256" x2="1024" y2="256"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="768" x2="1024" y2="768"/>
      <line x1="256" y1="0" x2="256" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="768" y1="0" x2="768" y2="1024"/>
    </g>

    <!-- Background glow -->
    <ellipse cx="500" cy="480" rx="260" ry="320" fill="#FF4444" opacity="0.08" filter="url(#softglow1)"/>

    <!-- Feather body - geometric faceted style -->
    <g filter="url(#glow1)" transform="translate(512, 500) rotate(-30)">
      <!-- Left barbs - angular geometric shapes -->
      <polygon points="0,-280 -110,-210 -8,-220" fill="#FF6B35" opacity="0.9"/>
      <polygon points="-8,-220 -140,-140 -14,-160" fill="#FF5533" opacity="0.85"/>
      <polygon points="-14,-160 -155,-60 -16,-90" fill="#FF4444" opacity="0.8"/>
      <polygon points="-16,-90 -150,30 -14,-10" fill="#FF3355" opacity="0.75"/>
      <polygon points="-14,-10 -130,110 -10,70" fill="#FF2D87" opacity="0.7"/>
      <polygon points="-10,70 -95,180 -6,150" fill="#FF2277" opacity="0.65"/>

      <!-- Right barbs - angular geometric shapes -->
      <polygon points="0,-280 110,-220 8,-220" fill="#FF7744" opacity="0.9"/>
      <polygon points="8,-220 135,-150 14,-160" fill="#FF6644" opacity="0.85"/>
      <polygon points="14,-160 148,-70 16,-90" fill="#FF5544" opacity="0.8"/>
      <polygon points="16,-90 142,20 14,-10" fill="#FF4455" opacity="0.75"/>
      <polygon points="14,-10 122,100 10,70" fill="#FF3366" opacity="0.7"/>
      <polygon points="10,70 88,170 6,150" fill="#FF2D77" opacity="0.65"/>

      <!-- Central rachis (quill shaft) -->
      <line x1="0" y1="-290" x2="0" y2="280" stroke="url(#quill1)" stroke-width="6" stroke-linecap="round"/>

      <!-- Quill tip -->
      <polygon points="-4,280 0,320 4,280" fill="#FFD700"/>

      <!-- Geometric accent dots along shaft -->
      <circle cx="0" cy="-200" r="4" fill="#FFD700" opacity="0.8"/>
      <circle cx="0" cy="-100" r="3.5" fill="#FFD700" opacity="0.6"/>
      <circle cx="0" cy="0" r="3" fill="#FFD700" opacity="0.5"/>
      <circle cx="0" cy="100" r="2.5" fill="#FFD700" opacity="0.4"/>
    </g>

    <!-- Corner accent lines -->
    <line x1="80" y1="80" x2="180" y2="80" stroke="#FF6B35" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
    <line x1="80" y1="80" x2="80" y2="180" stroke="#FF6B35" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
    <line x1="944" y1="944" x2="844" y2="944" stroke="#FF2D87" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
    <line x1="944" y1="944" x2="944" y2="844" stroke="#FF2D87" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  </g>
</svg>
