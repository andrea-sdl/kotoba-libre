<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="featherMain2" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="40%" stop-color="#00BBF9"/>
      <stop offset="100%" stop-color="#7B2FF7"/>
    </linearGradient>
    <linearGradient id="featherHighlight2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F5D4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00BBF9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shaft2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#00F5D4"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <filter id="glow2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="ambientGlow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="innerShadow2">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="2" dy="4" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
    <clipPath id="roundedRect2">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedRect2)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg2)"/>

    <!-- Ambient color glow -->
    <ellipse cx="480" cy="460" rx="300" ry="380" fill="#00BBF9" opacity="0.06" filter="url(#ambientGlow2)"/>
    <ellipse cx="540" cy="560" rx="200" ry="250" fill="#7B2FF7" opacity="0.05" filter="url(#ambientGlow2)"/>

    <!-- Feather - smooth organic curves -->
    <g transform="translate(505, 505) rotate(-35)" filter="url(#glow2)">

      <!-- Outer feather silhouette (smooth vane) -->
      <path d="
        M 0,-310
        C 40,-290 140,-230 165,-170
        C 190,-110 185,-40 175,20
        C 165,80 140,150 110,210
        C 85,260 50,300 8,330
        L 0,340
        L -8,330
        C -55,295 -95,250 -120,200
        C -150,140 -170,70 -178,0
        C -186,-70 -180,-140 -160,-200
        C -140,-255 -50,-295 0,-310
        Z
      " fill="url(#featherMain2)" opacity="0.92"/>

      <!-- Highlight overlay -->
      <path d="
        M 0,-310
        C 40,-290 140,-230 165,-170
        C 190,-110 185,-40 175,20
        C 165,80 140,150 110,210
        C 85,260 50,300 8,330
        L 0,250
        C 20,200 60,130 80,60
        C 100,-20 105,-100 80,-180
        C 60,-240 30,-280 0,-310
        Z
      " fill="url(#featherHighlight2)" opacity="0.4"/>

      <!-- Barb lines (delicate curves) -->
      <g stroke="#ffffff" stroke-width="1" opacity="0.15" fill="none">
        <path d="M 0,-260 C -60,-230 -120,-180 -150,-130"/>
        <path d="M 0,-200 C -70,-170 -130,-110 -165,-40"/>
        <path d="M 0,-140 C -75,-105 -140,-40 -170,40"/>
        <path d="M 0,-80 C -70,-45 -135,25 -160,100"/>
        <path d="M 0,-20 C -60,15 -120,80 -140,155"/>
        <path d="M 0,40 C -50,70 -95,130 -110,195"/>
        <path d="M 0,100 C -35,125 -70,170 -85,225"/>

        <path d="M 0,-260 C 55,-235 115,-190 145,-140"/>
        <path d="M 0,-200 C 65,-175 125,-120 155,-50"/>
        <path d="M 0,-140 C 70,-110 130,-50 160,30"/>
        <path d="M 0,-80 C 65,-50 125,20 150,90"/>
        <path d="M 0,-20 C 55,10 110,75 130,145"/>
        <path d="M 0,40 C 45,65 85,125 105,190"/>
        <path d="M 0,100 C 30,120 65,165 80,220"/>
      </g>

      <!-- Central rachis -->
      <path d="M 0,-310 C 2,-100 -2,100 0,340" stroke="url(#shaft2)" stroke-width="5" fill="none" stroke-linecap="round"/>

      <!-- Quill calamus -->
      <path d="M 0,340 Q -3,370 2,400 Q 5,370 0,340" fill="#f0f0f0" opacity="0.9"/>

      <!-- Subtle shine on rachis -->
      <path d="M -1,-280 C 0,-180 1,-80 0,20" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
    </g>

    <!-- Floating sparkle accents -->
    <circle cx="300" cy="250" r="2.5" fill="#00F5D4" opacity="0.5"/>
    <circle cx="740" cy="380" r="2" fill="#00BBF9" opacity="0.4"/>
    <circle cx="680" cy="720" r="3" fill="#7B2FF7" opacity="0.35"/>
    <circle cx="260" cy="680" r="1.8" fill="#00F5D4" opacity="0.3"/>
  </g>
</svg>
