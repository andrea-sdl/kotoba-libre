<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B0536"/>
      <stop offset="50%" stop-color="#240046"/>
      <stop offset="100%" stop-color="#1B0536"/>
    </linearGradient>
    <linearGradient id="featherFill3" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#AAFF00"/>
      <stop offset="100%" stop-color="#44DD00"/>
    </linearGradient>
    <linearGradient id="featherShadow3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#33AA00"/>
      <stop offset="100%" stop-color="#228800"/>
    </linearGradient>
    <linearGradient id="shaftGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#DDFF88"/>
    </linearGradient>
    <filter id="dropShadow3">
      <feDropShadow dx="6" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glowBg3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <clipPath id="roundedRect3">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedRect3)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg3)"/>

    <!-- Decorative background circles -->
    <circle cx="200" cy="200" r="280" fill="#AAFF00" opacity="0.03" filter="url(#glowBg3)"/>
    <circle cx="800" cy="800" r="250" fill="#44DD00" opacity="0.04" filter="url(#glowBg3)"/>

    <!-- Halftone-style dots pattern -->
    <g opacity="0.04" fill="#AAFF00">
      <circle cx="120" cy="120" r="8"/><circle cx="200" cy="120" r="7"/><circle cx="280" cy="120" r="6"/>
      <circle cx="360" cy="120" r="5"/><circle cx="440" cy="120" r="5"/><circle cx="520" cy="120" r="4"/>
      <circle cx="120" cy="200" r="7"/><circle cx="200" cy="200" r="8"/><circle cx="280" cy="200" r="7"/>
      <circle cx="120" cy="280" r="6"/><circle cx="200" cy="280" r="7"/><circle cx="280" cy="280" r="8"/>
      <circle cx="720" cy="720" r="5"/><circle cx="800" cy="720" r="6"/><circle cx="880" cy="720" r="7"/>
      <circle cx="720" cy="800" r="6"/><circle cx="800" cy="800" r="7"/><circle cx="880" cy="800" r="8"/>
      <circle cx="720" cy="880" r="7"/><circle cx="800" cy="880" r="8"/><circle cx="880" cy="880" r="8"/>
    </g>

    <g transform="translate(500, 490) rotate(-32)" filter="url(#dropShadow3)">

      <!-- Shadow layer feather (offset) -->
      <g transform="translate(8, 12)" opacity="0.2">
        <path d="
          M 0,-300
          C -20,-280 -145,-220 -170,-150
          C -195,-80 -180,10 -155,90
          C -130,165 -85,240 -30,295
          L 0,310
          L 30,295
          C 80,245 125,175 148,100
          C 172,25 178,-60 162,-140
          C 146,-215 20,-280 0,-300
          Z
        " fill="#000000"/>
      </g>

      <!-- Back feather half (darker) -->
      <path d="
        M 0,-300
        L 0,310
        L -30,295
        C -85,240 -130,165 -155,90
        C -180,10 -195,-80 -170,-150
        C -145,-220 -20,-280 0,-300
        Z
      " fill="url(#featherShadow3)"/>

      <!-- Front feather half (brighter) -->
      <path d="
        M 0,-300
        L 0,310
        L 30,295
        C 80,245 125,175 148,100
        C 172,25 178,-60 162,-140
        C 146,-215 20,-280 0,-300
        Z
      " fill="url(#featherFill3)"/>

      <!-- Bold barb cutouts (negative space style) -->
      <g fill="#1B0536" opacity="0.12">
        <path d="M 0,-250 L -130,-160 L 0,-200 Z"/>
        <path d="M 0,-170 L -155,-60 L 0,-110 Z"/>
        <path d="M 0,-80 L -165,40 L 0,-20 Z"/>
        <path d="M 0,10 L -150,130 L 0,75 Z"/>
        <path d="M 0,100 L -115,210 L 0,165 Z"/>
        <path d="M 0,190 L -65,270 L 0,250 Z"/>

        <path d="M 0,-250 L 125,-170 L 0,-200 Z"/>
        <path d="M 0,-170 L 148,-70 L 0,-110 Z"/>
        <path d="M 0,-80 L 158,30 L 0,-20 Z"/>
        <path d="M 0,10 L 142,120 L 0,75 Z"/>
        <path d="M 0,100 L 108,200 L 0,165 Z"/>
        <path d="M 0,190 L 60,265 L 0,250 Z"/>
      </g>

      <!-- White highlight edge -->
      <path d="
        M 0,-300
        C 15,-280 100,-230 130,-170
        C 155,-115 165,-50 165,10
      " stroke="#ffffff" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>

      <!-- Central shaft - bold -->
      <line x1="0" y1="-300" x2="0" y2="310" stroke="url(#shaftGrad3)" stroke-width="7" stroke-linecap="round"/>

      <!-- Quill nib -->
      <path d="M -6,310 Q 0,365 6,310" fill="#ffffff" opacity="0.85"/>
      <path d="M -3,310 Q 0,350 3,310" fill="#AAFF00" opacity="0.5"/>
    </g>

    <!-- Bold corner accent shapes -->
    <rect x="70" y="870" width="80" height="8" rx="4" fill="#AAFF00" opacity="0.2"/>
    <rect x="70" y="890" width="50" height="8" rx="4" fill="#AAFF00" opacity="0.15"/>
    <rect x="880" y="120" width="70" height="8" rx="4" fill="#AAFF00" opacity="0.2"/>
    <rect x="900" y="140" width="50" height="8" rx="4" fill="#AAFF00" opacity="0.15"/>
  </g>
</svg>
