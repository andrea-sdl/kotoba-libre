name: Release macOS (Unsigned DMG)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release bump to apply from the default branch"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      draft:
        description: "Create this release as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.repository.default_branch }}
  cancel-in-progress: false

jobs:
  release-macos:
    runs-on: macos-latest
    env:
      APP_NAME: Kotoba Libre
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require the default branch
        shell: bash
        run: |
          set -euo pipefail

          default_branch="${{ github.event.repository.default_branch }}"

          if [[ "${GITHUB_REF_NAME}" != "${default_branch}" ]]; then
            echo "Run this workflow from ${default_branch}. Current ref is ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(tr -d '[:space:]' < VERSION)"
          release_version="$(./scripts/ci/semver-bump.sh "${current_version}" "${{ inputs.bump }}")"
          next_dev_version="$(./scripts/ci/semver-bump.sh "${release_version}" patch --prerelease dev)"
          tag="v${release_version}"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "current_version=${current_version}" >> "${GITHUB_OUTPUT}"
          echo "version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "next_dev_version=${next_dev_version}" >> "${GITHUB_OUTPUT}"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Ensure tag and release do not already exist
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { owner, repo } = context.repo;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.setFailed(`Release for tag ${tag} already exists. Delete it or choose a different bump.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Ensure git tag does not already exist
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release_meta.outputs.tag }}"
          git fetch --tags --force origin

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin." >&2
            exit 1
          fi

      - name: Configure git author
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release commit and tag
        shell: bash
        run: |
          set -euo pipefail

          release_version="${{ steps.release_meta.outputs.version }}"
          tag="${{ steps.release_meta.outputs.tag }}"

          printf '%s\n' "${release_version}" > VERSION
          ./scripts/ci/validate-version.sh "${release_version}"

          git add VERSION
          git commit -m "Release ${tag}"
          git tag -a "${tag}" -m "Release ${tag}"

      - name: Build app bundle
        run: ./scripts/build-app.sh "${{ steps.release_meta.outputs.version }}"

      - name: Build Chrome extension zip
        run: ./scripts/package-chrome-extension.sh

      - name: Ensure expected artifacts exist
        shell: bash
        run: |
          set -euo pipefail
          test -d "dist-artifacts/${APP_NAME}.app"
          test -f "dist-artifacts/${APP_NAME}-unsigned.dmg"
          test -f "dist-artifacts/chrome-extension/kotobalibre-openid-callback.zip"

      - name: Create next development version commit
        shell: bash
        run: |
          set -euo pipefail

          next_dev_version="${{ steps.release_meta.outputs.next_dev_version }}"

          printf '%s\n' "${next_dev_version}" > VERSION
          git add VERSION
          git commit -m "Start ${next_dev_version}"

      - name: Push branch updates and tag
        shell: bash
        run: |
          set -euo pipefail

          default_branch="${{ github.event.repository.default_branch }}"
          tag="${{ steps.release_meta.outputs.tag }}"

          git push origin "HEAD:${default_branch}"
          git push origin "refs/tags/${tag}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Kotoba Libre v${{ steps.release_meta.outputs.version }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-artifacts/*-unsigned.dmg
            dist-artifacts/chrome-extension/*.zip
