name: Release macOS (Unsigned)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: 0.2.0 or v0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark this release as prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create this release as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            prerelease="false"
            draft="false"
          else
            input_version="${{ inputs.version }}"
            version="${input_version#v}"
            tag="v${version}"
            prerelease="${{ inputs.prerelease }}"
            draft="${{ inputs.draft }}"
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version: ${version}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "draft=${draft}" >> "${GITHUB_OUTPUT}"

      - name: Fail if release already exists
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { owner, repo } = context.repo;

            let existingRelease = null;
            try {
              existingRelease = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            if (existingRelease) {
              core.setFailed(`Release for tag ${tag} already exists. Delete it or bump the version.`);
            } else {
              core.info(`No release exists for tag ${tag}. Continuing.`);
            }

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate app version consistency
        run: ./scripts/ci/validate-version.sh "${{ steps.release_meta.outputs.version }}"

      - name: Build app bundle
        run: ./scripts/build-app.sh "${{ steps.release_meta.outputs.version }}"

      - name: Ensure expected artifacts exist
        shell: bash
        run: |
          set -euo pipefail
          test -d "dist-artifacts/Toro Libre.app"
          test -f "dist-artifacts/Toro Libre-unsigned.dmg"
          test -f "dist-artifacts/Toro Libre-unsigned-app.zip"

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          shasum -a 256 dist-artifacts/* > dist-artifacts/SHA256SUMS.txt

      - name: Ensure tag exists for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release_meta.outputs.tag }}"

          git fetch --tags --force

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${tag}"
          echo "Created tag ${tag} from ${GITHUB_SHA}"

      # Future signed/notarized flow can branch here via workflow inputs + secrets.
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Toro Libre v${{ steps.release_meta.outputs.version }}
          draft: ${{ steps.release_meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-artifacts/*-unsigned.dmg
            dist-artifacts/*-unsigned-app.zip
            dist-artifacts/SHA256SUMS.txt
